<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 64 64">
  <defs>
    <!-- Background gradient — vert profond en haut, vert vif en bas -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d6b38"/>
      <stop offset="100%" stop-color="#28a24e"/>
    </linearGradient>
    <!-- Lueur douce derrière la plante -->
    <radialGradient id="glow" cx="50%" cy="58%" r="38%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond arrondi avec dégradé -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <!-- Lueur -->
  <rect width="64" height="64" rx="15" fill="url(#glow)"/>

  <!-- ── Arcs WiFi / connectivité ── -->
  <!-- Arc extérieur -->
  <path d="M14 21.5 Q32 11 50 21.5"
        stroke="white" stroke-width="2.8" fill="none"
        stroke-linecap="round" opacity="0.38"/>
  <!-- Arc milieu -->
  <path d="M19.5 27.5 Q32 19.5 44.5 27.5"
        stroke="white" stroke-width="2.8" fill="none"
        stroke-linecap="round" opacity="0.62"/>
  <!-- Arc intérieur -->
  <path d="M25 33.5 Q32 28 39 33.5"
        stroke="white" stroke-width="2.8" fill="none"
        stroke-linecap="round" opacity="0.92"/>
  <!-- Point signal -->
  <circle cx="32" cy="37" r="2.8" fill="white"/>

  <!-- ── Tige centrale ── -->
  <path d="M32 39.5 L32 55"
        stroke="white" stroke-width="2.6" stroke-linecap="round"/>

  <!-- ── Feuille gauche — courbe naturelle ── -->
  <path d="M32 52 C30 49 22 47 21 41 C21 41 30 39.5 32 52Z"
        fill="white" opacity="0.80"/>

  <!-- ── Feuille droite — plus haute ── -->
  <path d="M32 47.5 C34 44.5 42 42 43 36 C43 36 34 35 32 47.5Z"
        fill="white"/>

  <!-- ── Sol / racines (3 points) ── -->
  <circle cx="26" cy="57" r="1.6" fill="white" opacity="0.40"/>
  <circle cx="32" cy="58.5" r="1.6" fill="white" opacity="0.55"/>
  <circle cx="38" cy="57" r="1.6" fill="white" opacity="0.40"/>
</svg>
