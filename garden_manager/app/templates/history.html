{% extends "base.html" %}
{% block title %}Graphiques{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-row">
    <div>
      <div class="page-title">Graphiques</div>
      <div class="page-subtitle">Évolution des capteurs dans le temps</div>
    </div>
    <div class="time-tabs">
      <button class="time-tab active" onclick="switchHistTab(this, 24)">24h</button>
      <button class="time-tab" onclick="switchHistTab(this, 168)">7j</button>
      <button class="time-tab" onclick="switchHistTab(this, 720)">30j</button>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="card mb-3">
    <div class="card-title"><i class="bi bi-droplet-half"></i> Humidité sol — 4 zones</div>
    <div id="historyChart" style="height:330px;"></div>
  </div>

  <div class="card">
    <div class="card-title"><i class="bi bi-thermometer-half" style="color:var(--orange);"></i> Températures — extérieure &amp; serre</div>
    <div id="tempChart" style="height:200px;"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const ZONE_COLORS = {1:'#30d158', 2:'#8BC34A', 3:'#0a84ff', 4:'#bf5af2'};
const ZONE_NAMES  = {1:'Serre', 2:'Soleil', 3:'Mi-ombre', 4:'Aromates'};

function plotlyTheme(extra) {
  const dark = (document.documentElement.getAttribute('data-theme') || 'dark') !== 'light';
  const fontColor = dark ? 'rgba(255,255,255,.55)' : 'rgba(17,19,21,.70)';
  const gridColor = dark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.08)';
  const lineColor = dark ? 'rgba(255,255,255,.10)' : 'rgba(0,0,0,.14)';
  return {
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: {color: fontColor, size: 11, family: '-apple-system,BlinkMacSystemFont,system-ui'},
    xaxis: {gridcolor: gridColor, linecolor: lineColor, tickcolor: lineColor, tickformat: '%H:%M\n%d.%m'},
    yaxis: {gridcolor: gridColor, linecolor: lineColor, tickcolor: lineColor},
    legend: {orientation: 'h', y: -0.22, bgcolor: 'transparent', font: {color: fontColor}},
    ...extra,
  };
}

let _histHours = 24;

function switchHistTab(btn, h) {
  document.querySelectorAll('.time-tabs .time-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadHistory(h);
}

async function loadHistory(hours) {
  _histHours = hours;
  const resp = await fetch(`/api/data/history?hours=${hours}`);
  if (!resp.ok) return;
  const data = await resp.json();
  const traces = [];
  let refReadings = null;

  for (const [zid, readings] of Object.entries(data.zones)) {
    const id = +zid;
    traces.push({
      x: readings.map(r => r.timestamp),
      y: readings.map(r => r.soil_moisture_pct),
      type: 'scatter', mode: 'lines',
      name: ZONE_NAMES[id] || `Zone ${id}`,
      line: {color: ZONE_COLORS[id], width: 2},
    });
    if (!refReadings) refReadings = readings;
  }

  Plotly.react('historyChart', traces, plotlyTheme({
    margin: {t: 10, b: 44, l: 44, r: 12},
    yaxis: {title: 'Humidité (%)', range: [0, 100]},
  }), {responsive: true, displayModeBar: false});

  if (refReadings) {
    const tempTraces = [
      {
        x: refReadings.map(r => r.timestamp),
        y: refReadings.map(r => r.temperature_c),
        type: 'scatter', mode: 'lines', name: 'Ext.',
        line: {color: '#ff9f0a', width: 1.5},
      },
    ];
    if (refReadings.some(r => r.temp_serre_c != null)) {
      tempTraces.push({
        x: refReadings.map(r => r.timestamp),
        y: refReadings.map(r => r.temp_serre_c),
        type: 'scatter', mode: 'lines', name: 'Serre',
        line: {color: '#30d158', width: 1.5, dash: 'dot'},
      });
    }
    Plotly.react('tempChart', tempTraces, plotlyTheme({
      margin: {t: 10, b: 44, l: 44, r: 12},
      yaxis: {title: 'Température (°C)'},
    }), {responsive: true, displayModeBar: false});
  }
}

loadHistory(24);
</script>
{% endblock %}
