{% extends "base.html" %}
{% block title %}Graphiques{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-row">
    <div>
      <div class="page-title">Graphiques</div>
      <div class="page-subtitle">Évolution des capteurs dans le temps</div>
    </div>
  </div>
</div>

<div class="page-body">
  <!-- ── Contrôles : filtres zone + période (modèle Encyclopédie) ── -->
  <div class="filter-bar">
    <div class="filter-section">
      <div class="filter-section-label"><i class="bi bi-grid-1x2-fill"></i> Zones</div>
      <div class="filter-row">
        <button class="filter-chip active" data-zone="all" onclick="setHistZone(this,'all')"><i class="bi bi-stars"></i> Toutes</button>
        {% for z in zones %}
        <button class="filter-chip" data-zone="{{ z.zone_id }}" onclick="setHistZone(this,{{ z.zone_id }})">
          {% if z.zone_id == 1 %}<i class="bi bi-house-door-fill"></i>
          {% elif z.zone_id == 2 %}<i class="bi bi-sun-fill"></i>
          {% elif z.zone_id == 3 %}<i class="bi bi-cloud-sun-fill"></i>
          {% else %}<i class="bi bi-flower3"></i>{% endif %}
          {{ z.name }}
        </button>
        {% endfor %}
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-section-label"><i class="bi bi-clock-history"></i> Période</div>
      <div class="filter-row">
        <button class="filter-chip active" data-period="24"  onclick="setHistPeriod(this, 24)">24 h</button>
        <button class="filter-chip"        data-period="168" onclick="setHistPeriod(this, 168)">7 jours</button>
        <button class="filter-chip"        data-period="720" onclick="setHistPeriod(this, 720)">30 jours</button>
      </div>
    </div>
  </div>

  <!-- ── 3 graphiques séparés, même base de temps ── -->
  <div class="card mb-3">
    <div class="card-title"><i class="bi bi-droplet-half" style="color:var(--blue);"></i> Humidité du sol</div>
    <div id="moistureChart" style="height:300px;"></div>
  </div>

  <div class="card mb-3">
    <div class="card-title"><i class="bi bi-thermometer-half" style="color:var(--orange);"></i> Températures</div>
    <div id="tempChart" style="height:240px;"></div>
  </div>

  <div class="card">
    <div class="card-title"><i class="bi bi-droplet-fill" style="color:var(--green);"></i> Événements d'arrosage</div>
    <div id="irrigChart" style="height:200px;"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const ZONE_COLORS = {1:'#30d158', 2:'#8BC34A', 3:'#0a84ff', 4:'#bf5af2'};
// Noms des zones lus depuis la base (paramétrage utilisateur)
const ZONE_NAMES  = {
  {% for z in zones %}{{ z.zone_id }}: {{ z.name | tojson }}{% if not loop.last %}, {% endif %}{% endfor %}
};

let _histHours = 24;
let _histZone  = 'all';   // 'all' ou 1/2/3/4

function plotlyTheme(extra) {
  const dark = (document.documentElement.getAttribute('data-theme') || 'dark') !== 'light';
  const fontColor = dark ? 'rgba(255,255,255,.55)' : 'rgba(17,19,21,.70)';
  const gridColor = dark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.08)';
  const lineColor = dark ? 'rgba(255,255,255,.10)' : 'rgba(0,0,0,.14)';
  return {
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: {color: fontColor, size: 11, family: '-apple-system,BlinkMacSystemFont,system-ui'},
    xaxis: {gridcolor: gridColor, linecolor: lineColor, tickcolor: lineColor, tickformat: '%H:%M\n%d.%m'},
    yaxis: {gridcolor: gridColor, linecolor: lineColor, tickcolor: lineColor},
    legend: {orientation: 'h', y: -0.22, bgcolor: 'transparent', font: {color: fontColor}},
    ...extra,
  };
}

function setHistPeriod(btn, h) {
  document.querySelectorAll('.filter-chip[data-period]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _histHours = h;
  loadHistory();
}

function setHistZone(btn, z) {
  document.querySelectorAll('.filter-chip[data-zone]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _histZone = z;
  loadHistory();
}

async function loadHistory() {
  const resp = await fetch(`/api/data/history?hours=${_histHours}`);
  if (!resp.ok) return;
  const data = await resp.json();
  const zonesData = data.zones || {};

  // Zones à afficher
  const zoneIds = (_histZone === 'all')
    ? Object.keys(zonesData).map(z => +z)
    : (zonesData[_histZone] ? [+_histZone] : []);

  // ── 1) Humidité du sol — 1 trace par zone affichée ──
  const moistureTraces = zoneIds.map(id => ({
    x: zonesData[id].map(r => r.timestamp),
    y: zonesData[id].map(r => r.soil_moisture_pct),
    type: 'scatter', mode: 'lines',
    name: ZONE_NAMES[id] || `Zone ${id}`,
    line: {color: ZONE_COLORS[id], width: 2.2},
    hovertemplate: '%{y:.1f}%<extra>' + (ZONE_NAMES[id] || `Zone ${id}`) + '</extra>',
  }));
  Plotly.react('moistureChart', moistureTraces, plotlyTheme({
    margin: {t: 10, b: 44, l: 44, r: 12},
    yaxis: {title: 'Humidité (%)', range: [0, 100]},
  }), {responsive: true, displayModeBar: false});

  // ── 2) Températures — extérieure et serre (basé sur la 1ère zone du set) ──
  const refReadings = zoneIds.length ? zonesData[zoneIds[0]] : null;
  const tempTraces = [];
  if (refReadings && refReadings.length) {
    tempTraces.push({
      x: refReadings.map(r => r.timestamp),
      y: refReadings.map(r => r.temperature_c),
      type: 'scatter', mode: 'lines', name: 'Extérieure',
      line: {color: '#ff9f0a', width: 1.8},
      hovertemplate: '%{y:.1f}°C<extra>Ext.</extra>',
    });
    if (refReadings.some(r => r.temp_serre_c != null)) {
      tempTraces.push({
        x: refReadings.map(r => r.timestamp),
        y: refReadings.map(r => r.temp_serre_c),
        type: 'scatter', mode: 'lines', name: 'Serre',
        line: {color: '#30d158', width: 1.8, dash: 'dot'},
        hovertemplate: '%{y:.1f}°C<extra>Serre</extra>',
      });
    }
  }
  Plotly.react('tempChart', tempTraces, plotlyTheme({
    margin: {t: 10, b: 44, l: 44, r: 12},
    yaxis: {title: 'Température (°C)'},
  }), {responsive: true, displayModeBar: false});

  // ── 3) Événements d'arrosage — barres open/close par zone ──
  try {
    const evResp = await fetch(`/api/data/irrigation_events?hours=${_histHours}`);
    if (evResp.ok) {
      const evData = await evResp.json();
      const events = (evData.events || []).filter(e =>
        _histZone === 'all' || e.zone_id === +_histZone
      );
      // Trace par zone : 1 barre verticale par "open" (durée jusqu'au "close")
      const evTraces = [];
      const byZone = {};
      events.forEach(e => { (byZone[e.zone_id] = byZone[e.zone_id] || []).push(e); });
      for (const [zid, evs] of Object.entries(byZone)) {
        const id = +zid;
        const opens = evs.filter(e => e.action === 'open');
        evTraces.push({
          x: opens.map(e => e.timestamp),
          y: opens.map(_ => 1),
          type: 'bar', name: ZONE_NAMES[id] || `Zone ${id}`,
          marker: {color: ZONE_COLORS[id], opacity: .8},
          hovertemplate: '%{x|%d.%m %H:%M}<extra>' + (ZONE_NAMES[id] || `Zone ${id}`) + ' — ouverture</extra>',
        });
      }
      Plotly.react('irrigChart', evTraces, plotlyTheme({
        margin: {t: 10, b: 44, l: 44, r: 12},
        yaxis: {title: 'Ouvertures', range: [0, 1.4], showticklabels: false},
        barmode: 'overlay', bargap: 0.6,
      }), {responsive: true, displayModeBar: false});
    }
  } catch (e) {
    console.warn('Irrigation events fetch failed:', e);
  }
}

loadHistory();
</script>
{% endblock %}
