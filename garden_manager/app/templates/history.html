{% extends "base.html" %}
{% block title %}Graphiques{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-row">
    <div>
      <div class="page-title">Graphiques</div>
      <div class="page-subtitle">Évolution des capteurs dans le temps</div>
    </div>
    <div class="time-tabs">
      <button class="time-tab active" onclick="switchHistTab(this, 24)">24h</button>
      <button class="time-tab" onclick="switchHistTab(this, 168)">7j</button>
      <button class="time-tab" onclick="switchHistTab(this, 720)">30j</button>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="card mb-3">
    <div class="card-title"><i class="bi bi-droplet-half"></i> Humidité sol — 4 zones</div>
    <div id="historyChart" style="height:330px;"></div>
  </div>

  <div class="card">
    <div class="card-title"><i class="bi bi-thermometer-half" style="color:var(--orange);"></i> Température extérieure</div>
    <div id="tempChart" style="height:200px;"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const ZONE_COLORS = {1:'#30d158', 2:'#8BC34A', 3:'#0a84ff', 4:'#bf5af2'};
const ZONE_NAMES  = {1:'Serre', 2:'Soleil', 3:'Mi-ombre', 4:'Aromates'};

const darkLayout = {
  paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
  font: {color: 'rgba(255,255,255,.55)', size: 11, family: '-apple-system,BlinkMacSystemFont,system-ui'},
  margin: {t: 10, b: 44, l: 44, r: 12},
  xaxis: {gridcolor: 'rgba(255,255,255,.06)', tickformat: '%H:%M\n%d.%m', linecolor: 'rgba(255,255,255,.08)'},
  yaxis: {title: '', gridcolor: 'rgba(255,255,255,.06)', linecolor: 'rgba(255,255,255,.08)'},
  legend: {orientation: 'h', y: -0.22, bgcolor: 'transparent'},
};

let _histHours = 24;

function switchHistTab(btn, h) {
  document.querySelectorAll('.time-tabs .time-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadHistory(h);
}

async function loadHistory(hours) {
  _histHours = hours;
  const resp = await fetch(`/api/data/history?hours=${hours}`);
  if (!resp.ok) return;
  const data = await resp.json();
  const traces = [];
  let tempTrace = null;

  for (const [zid, readings] of Object.entries(data.zones)) {
    traces.push({
      x: readings.map(r => r.timestamp),
      y: readings.map(r => r.soil_moisture_pct),
      type: 'scatter', mode: 'lines',
      name: ZONE_NAMES[zid] || `Zone ${zid}`,
      line: {color: ZONE_COLORS[zid], width: 2},
      fill: traces.length === 0 ? 'none' : 'none',
    });
    if (!tempTrace) {
      tempTrace = {
        x: readings.map(r => r.timestamp),
        y: readings.map(r => r.temperature_c),
        type: 'scatter', mode: 'lines', name: 'Température',
        line: {color: '#ff9f0a', width: 1.5},
      };
    }
  }

  Plotly.react('historyChart', traces, {
    ...darkLayout,
    yaxis: {...darkLayout.yaxis, title: 'Humidité (%)', range: [0, 100]},
  }, {responsive: true, displayModeBar: false});

  if (tempTrace) {
    Plotly.react('tempChart', [tempTrace], {
      ...darkLayout,
      yaxis: {...darkLayout.yaxis, title: 'Température (°C)'},
    }, {responsive: true, displayModeBar: false});
  }
}

loadHistory(24);
</script>
{% endblock %}
