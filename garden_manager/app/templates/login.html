<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — MonJardin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=15">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <script>(function(){ const t=localStorage.getItem('theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();</script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-app); }
    .login-box {
      width:100%; max-width:380px; padding:0 16px;
    }
    .login-card {
      background:var(--bg-primary); border:1px solid var(--border); border-radius:var(--r-lg);
      padding:32px 28px; box-shadow:0 8px 32px rgba(0,0,0,.18);
    }
    .login-brand {
      display:flex; flex-direction:column; align-items:center; gap:14px;
      margin-bottom:32px;
    }
    .login-brand-icon {
      width:96px; height:96px; border-radius:22px;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .login-title { font-size:22px; font-weight:700; text-align:center; }
    .login-sub   { font-size:12px; color:var(--text-tertiary); margin-top:2px; text-align:center; }
    .login-error {
      background:rgba(255,69,58,.08); border:1px solid rgba(255,69,58,.2);
      border-radius:var(--r-md); padding:10px 14px; font-size:13px; color:var(--red);
      margin-bottom:16px; display:flex; align-items:center; gap:8px;
    }
    .pin-input {
      letter-spacing:6px; font-size:22px; font-weight:700; text-align:center;
    }
    .login-footer { text-align:center; font-size:11px; color:var(--text-tertiary); margin-top:16px; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon"><img src="/static/logo.svg" alt="MonJardin" style="width:96px;height:96px;display:block;"></div>
      <div>
        <div class="login-title">MonJardin</div>
        <div class="login-sub">{{ garden_location }}</div>
      </div>
    </div>

    {% if error %}
    <div class="login-error">
      <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login/post">
      <input type="hidden" name="next_url" value="{{ next_url }}">
      <div class="form-group">
        <label class="form-label">Utilisateur</label>
        <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur"
               autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Code PIN</label>
        <input type="password" name="pin" class="form-control pin-input"
               placeholder="••••" inputmode="numeric" maxlength="8"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="margin-top:8px;">
        <i class="bi bi-box-arrow-in-right"></i> Connexion
      </button>
    </form>
  </div>
  <div class="login-footer">MonJardin · Système de gestion du jardin potager</div>
</div>
</body>
</html>
