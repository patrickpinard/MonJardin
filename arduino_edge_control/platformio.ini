[env:edge_control]
platform = arduino
board = arduino_edge_control
framework = arduino
lib_deps =
    arduino-libraries/Arduino_EdgeControl
    PaulStoffregen/OneWire
    milesburton/DallasTemperature
    bblanchon/ArduinoJson@^6.21
monitor_speed = 115200
build_flags =
    -DARDUINO_EDGE_CONTROL
    -DCORE_DEBUG_LEVEL=3
